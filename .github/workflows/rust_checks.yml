name: Rust Checks

on: [push, pull_request]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88
          components: rustfmt, clippy

      - name: Clippy (bug-focused lints)
        run: >
          cargo clippy --all-targets --features bench --
          -W clippy::unwrap_used
          -W clippy::expect_used
          -W clippy::panic
          -W clippy::indexing_slicing

      - name: Run tests
        run: cargo test --all-targets --features bench

      - name: Build documentation
        run: cargo doc --no-deps

      - name: Publish documentation gate
        run: bash scripts/check_publish_docs.sh

      - name: Publish package gate
        run: bash scripts/check_publish_package.sh
